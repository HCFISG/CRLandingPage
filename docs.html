<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Help & Instructions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="hcf.png">
  <link rel="icon" type="image/png" href="hcf.png" sizes="32x32">
  <link rel="apple-touch-icon" href="hcf.png">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #fafbfc 0%, #f3f6f9 50%, #eef1f5 100%);
      min-height: 100vh;
      margin: 0;
      padding: 40px;
      text-align: center;
      color: #333;
      animation: fadeIn 1.5s ease;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      margin-bottom: 20px;
      padding-bottom: 10px;
      font-size: 25px;
      font-weight: 600;
      color: #1f2937;
      border-bottom: 1px solid #ddd;
      display: inline-block;
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
    }

    .links {
      max-width: 500px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 10px;
      justify-items: center;
      justify-content: center;
    }

    .links a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 30px;
      text-decoration: none;
      color: #333;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 18px;
      transition: all 0.15s ease;
      width: 70%;
      font-size: 17px;
      font-weight: 600;
    }

    .links a:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.30);
      background: #ffffff;
    }

    .links a img {
      width: 65px;
      height: 65px;
      object-fit: contain;
      transition: transform 0.15s ease;
    }

    .links a:hover img {
      transform: scale(1.15);
    }


    .subtext {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 20px;
    }

  </style>
</head>
<body>

  <h1>Help & Instructions</h1>

<div class="subtext">
  Select your conference room
</div>

  <div class="links">

    <a href="docs-aloha.html"
      rel="noopener noreferrer">
      Aloha Conference Room
    </a>

    <a href="docs-calabash.html"
      rel="noopener noreferrer">
      Calabash Conference Room
    </a>

    <a href="docs-calabashmobile.html"
      rel="noopener noreferrer">
      Calabash Mobile Station
    </a>

    <a href="docs-kahiau.html"
      rel="noopener noreferrer">
      Kahiau Conference Room
    </a>

    <a href="docs-kuleana.html"
      rel="noopener noreferrer">
      Kuleana Conference Room
    </a>

    <a href="docs-lokahi.html"
      rel="noopener noreferrer">
      Lokahi Conference Room
    </a>

    <a href="docs-malama.html"
      rel="noopener noreferrer">
      Malama Conference Room
    </a>

  </div>

</body>
</html>
