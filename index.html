<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HCF Conference Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="hcf.png">
  <link rel="icon" type="image/png" href="hcf.png" sizes="32x32">
  <link rel="apple-touch-icon" href="hcf.png">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #fafbfc 0%, #f3f6f9 50%, #eef1f5 100%);
      min-height: 100vh;
      margin: 0;
      padding: 24px 40p;
      text-align: center;
      color: #333;
      animation: fadeIn 1.5s ease;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      margin-bottom: 20px;
      padding-bottom: 10px;
      font-size: 40px;
      font-weight: 600;
      color: #1f2937;
      border-bottom: 1px solid #ddd;
      display: inline-block;
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
    }

    .links {
      max-width: 900px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .links a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      text-decoration: none;
      color: #333;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 70px;
      transition: all 0.15s ease
      font-size: 17px;
      font-weight: 600;
    }

    .links a:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.30);
      background: #ffffff;
    }

    .links a img {
      width: 65px;
      height: 65px;
      object-fit: contain;
      transition: transform 0.15s ease;
    }

    .links a:hover img {
      transform: scale(1.15);
    }

    .links a span {
      font-size: 15px;
      font-weight: 600;
    }

    .wifi {
      margin: 15px auto 0;
      padding: 16px 32px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      font-size: 18px;
      text-align: center;
      max-width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      text-align: center;
    }

    .wifi h2 {
      font-size: 20px;
      font-weight: 600;
      color: #444;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .wifi-grid {
      display: grid;
      grid-template-columns: auto;
      gap: 4px;
      justify-items: center;
    }

    .wifi-grid .label {
      font-weight: 600;
    }

    .wifi-grid .value {
      font-family: monospace;
      font-size: 20px;
    }

    .wifi strong {
      color: #444;
    }

    .wifi div {
      font-size: 18px;
    }

    .wifi-qr {
      margin-top: 10px;
      width: 120px;
      height: 120px;
      display: block;
      margin: 15px auto 0;
    }

    .notice {
      margin: 15px auto 0;
      padding: 20px 40px;
      max-width: 680px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      color: #374151;
      font-size: 16px;
      line-height: 1.4;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

  </style>
</head>
<body>

  <h1>Aloha, E Komo Mai!</h1>

  </div>

</html>
