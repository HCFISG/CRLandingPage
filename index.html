<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Conference Room Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .links {
      max-width: 600px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .links a {
      display: block;
      padding: 24px;
      font-size: 22px;
      text-decoration: none;
      color: #000;
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .links a:hover {
      background: #e6f0ff;
      border-color: #3366cc;
    }

    .wifi {
      display: inline-block;
      margin: 40px auto 0;
      padding: 20px 30px;
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 18px;
      text-align: left;
    }

    .wifi h2 {
      margin: 0 0 16px 0;
      font-size: 22px;
      text-align: center;
    }

    .wifi-grid {
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 20px;
      row-gap: 10px;
      align-items: center;
    }

    .wifi-grid .label {
      font-weight: bold;
    }

    .wifi-grid .value {
      font-family: monospace;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1>Conference Room Links</h1>

  <div class="links">
    <a href="https://www.google.com"
       target="_blank" rel="noopener noreferrer">
      Ho'okahi
    </a>

    <a href="https://hcfhawaii.sharepoint.com/sites/Hookahi5/SitePages/Hookahi-5.0.aspx"
       target="_blank" rel="noopener noreferrer">
      Ho'okahi
    </a>

    <a href="https://m365.cloud.microsoft/apps"
       target="_blank" rel="noopener noreferrer">
      Microsoft 365 Apps
    </a>

    <a href="https://zoom.us/join"
       target="_blank" rel="noopener noreferrer">
      Join Zoom Meeting
    </a>

    <a href="https://signin.webex.com/join"
       target="_blank" rel="noopener noreferrer">
      Join Webex Meeting
    </a>
  </div>

  <div class="wifi">
    <h2>Guest Wi‑Fi</h2>
    <div class="wifi-grid">
      <div class="label">WiFi Name:</div>
      <div class="value">Makapuu</div>

      <div class="label">WiFi Password:</div>
      <div class="value">Vibrant!Hawaii-5</div>
    </div>
  </div>

</body>
</html>
